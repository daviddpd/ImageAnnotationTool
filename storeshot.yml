app:
  name: ImageAnnotationTool
platforms:
  - ios
  - macos
xcode:
  project: ImageAnnotationTool.xcodeproj
  schemes:
    - ImageAnnotationTool
  uiTestTargets:
    - ImageAnnotationToolUITests
locales:
  - en-US
ios:
  simulators:
    - iPhone 16 Pro Max
    - iPad Pro (13-inch) (M4)
  deepLinks:
    home: imageannotationtool://home
  launchArguments:
    - -UITestMode
    - -UseMockData
  environment:
    STORESHOT_MODE: demo
  appearanceVariants:
    - light
    - dark
macos:
  compositionMode: desktopComposite
  outputSizes:
    - 2880x1800
  desktopBackgroundLight: Assets/DesktopLight.png
  desktopBackgroundDark: Assets/DesktopDark.png
  windowCornerRadius: 24
  shadowEnabled: true
  appearanceVariants:
    - light
    - dark
scenarios:
  - name: home
    platform: ios
    route: imageannotationtool://home
    expectedFilename: home.png
    caption: Home screen
    order: 1
  - name: dashboard
    platform: macos
    setupInstructions: Open the primary dashboard window
    expectedFilename: dashboard.png
    caption: Main dashboard
    order: 1
hooks:
  beforeAll:
    - scripts/seed_demo_data.sh
output:
  capturesDirectory: .storeshot/captures
  exportDirectory: .storeshot/export
  previewDirectory: .storeshot/preview
  includeLocaleFolders: true
  orderedFilenames: true
